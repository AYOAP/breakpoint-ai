services:
  - type: web
    name: getbreakpoint
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: BREAKPOINT_DAILY_API_LIMIT
        value: "100"
